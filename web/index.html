<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pokémon Agent</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --line: #262b36;
    --text: #e7eaf0; --muted: #8b93a3;
    --user: #2563eb; --agent: #232833; --accent: #22c55e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8; --panel: #ffffff; --line: #e3e6eb;
      --text: #14181f; --muted: #66707e;
      --user: #2563eb; --agent: #eef1f5; --accent: #16a34a;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px; background: var(--panel);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  header input {
    margin-left: auto; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px;
    font-size: 13px; width: 160px;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px; max-width: 820px;
    width: 100%; margin: 0 auto;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
  .agent .bubble { background: var(--agent); border-bottom-left-radius: 4px; }
  .chip {
    align-self: flex-start; font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px;
  }
  .chip b { color: var(--text); font-weight: 600; }
  form {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--line);
    background: var(--panel); max-width: 820px; width: 100%; margin: 0 auto;
  }
  textarea {
    flex: 1; resize: none; height: 44px; max-height: 160px; padding: 11px 14px;
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 12px; font: inherit; overflow: hidden;
  }
  button {
    background: var(--user); color: #fff; border: 0; border-radius: 12px;
    padding: 0 20px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  .cursor::after { content: "▍"; animation: blink 1s steps(2) infinite; color: var(--muted); }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>Pokémon Agent — demo</h1>
  </header>

  <div id="log">
    <div class="chip">Ask about any Pokémon, grounded in live PokéAPI data. Try
      <b>Tell me about Charizard</b>, then <b>What abilities can it have?</b></div>
  </div>

  <form id="form">
    <textarea id="input" placeholder="Ask about a Pokémon…  (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" type="submit">Send</button>
  </form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

// One conversation id per page load -> the server threads it into the graph so
// follow-ups ("it" -> Charizard) resolve against this session's history.
const THREAD_ID = (crypto.randomUUID && crypto.randomUUID()) ||
  (Date.now().toString(36) + Math.random().toString(36).slice(2));

function addRow(role, text = '') {
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return bubble;
}

async function send(message) {
  addRow('user', message);
  const bubble = addRow('agent', '');
  bubble.classList.add('cursor');

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, thread_id: THREAD_ID }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf('\n\n')) >= 0) {
        const line = buffer.slice(0, idx); buffer = buffer.slice(idx + 2);
        if (!line.startsWith('data: ')) continue;
        const evt = JSON.parse(line.slice(6));
        if (evt.type === 'token') { bubble.textContent += evt.text; }
        else if (evt.type === 'meta') { bubble.insertAdjacentElement('beforebegin', chipFor(evt)); }
        else if (evt.type === 'error') { bubble.textContent = '⚠️ ' + evt.text; }
        log.scrollTop = log.scrollHeight;
      }
    }
  } catch (err) {
    bubble.textContent = '⚠️ ' + err.message;
  } finally {
    bubble.classList.remove('cursor');
  }
}

// Build a chip element for the meta event and place it above the agent bubble.
function chipFor(meta) {
  const chip = document.createElement('div');
  chip.className = 'chip';
  const followup = meta.is_followup ? ' · <b>follow-up</b>' : '';
  chip.innerHTML = `route <b>${meta.route}</b> · ${meta.query_type}${followup}`;
  return chip;
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.style.height = '44px';
  send(msg);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

// Grow the box to fit its content instead of scrolling.
function autoGrow() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}
input.addEventListener('input', autoGrow);
</script>
</body>
</html>
